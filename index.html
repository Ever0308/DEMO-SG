<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=5.0">
  <meta name="theme-color" content="#1a56db">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>San Gaspar | Finanzas</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      /* Paleta principal */
      --primary-50: #eff6ff;
      --primary-100: #dbeafe;
      --primary-200: #bfdbfe;
      --primary-300: #93c5fd;
      --primary-400: #186dd5;
      --primary-500: #1651b1;
      --primary-600: #0d368d;
      --primary-700: #0d349e;
      --primary-800: #071645;
      --primary-900: #05143d;
      
      /* Éxito */
      --success-50: #f0fdf4;
      --success-500: #197e3e;
      --success-600: #0d5b29;
      --success-700: #09421e;
      
      /* Advertencia */
      --warning-500: #f59e0b;
      --warning-600: #d97706;
      
      /* Peligro */
      --danger-500: #ef4444;
      --danger-600: #dc2626;
      
      /* Neutros */
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      
      /* Sombras */
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      
      /* Bordes */
      --radius-sm: 0.375rem;
      --radius: 0.5rem;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-xl: 1.5rem;
      --radius-full: 9999px;
      
      /* Transiciones */
      --transition: 200ms ease;
      
      /* 📱 TIPOGRAFÍA FLUIDA - Se adapta de móvil a tablet */
      --text-xs: clamp(0.65rem, 0.6rem + 0.25vw, 0.75rem);
      --text-sm: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-base: clamp(0.875rem, 0.8rem + 0.375vw, 1rem);
      --text-lg: clamp(1rem, 0.9rem + 0.5vw, 1.125rem);
      --text-xl: clamp(1.125rem, 1rem + 0.625vw, 1.25rem);
      --text-2xl: clamp(1.25rem, 1.1rem + 0.75vw, 1.5rem);
      --text-3xl: clamp(1.5rem, 1.3rem + 1vw, 1.875rem);
      
      /* Espaciados fluidos */
      --space-xs: clamp(0.5rem, 0.4rem + 0.5vw, 0.75rem);
      --space-sm: clamp(0.75rem, 0.6rem + 0.75vw, 1rem);
      --space-md: clamp(1rem, 0.8rem + 1vw, 1.5rem);
      --space-lg: clamp(1.5rem, 1.2rem + 1.5vw, 2rem);
      --space-xl: clamp(2rem, 1.5rem + 2.5vw, 3rem);
    }

    /* Reset y base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    
    input, select, textarea, button {
      user-select: text;
      -webkit-user-select: text;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    html {
      font-size: 16px; /* Base para rem */
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      background: linear-gradient(-45deg, #f0f4ff, #e0e7ff, #dbeafe, #bfdbfe);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', 'Roboto', sans-serif;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      margin: 0;
      color: var(--gray-800);
      line-height: 1.5;
      font-size: var(--text-base);
    }

    .app-container {
      width: 100%;
      min-height: 100vh;
      background: transparent;
      margin: 0;
      padding: 0;
      position: relative;
      /* 🖥️ EN COMPUTADORA: Comportarse como tablet (máx 768px) */
      max-width: 100%;
    }

    /* ========== MENÚ PRINCIPAL ========== */
    .menu-container {
      width: 100%;
      min-height: 100vh;
      padding: var(--space-lg) var(--space-md);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .content-wrapper {
      width: 100%;
      /* 📱 Móvil: 100%, 🖥️ Desktop: como tablet (máx 768px) */
      max-width: min(100%, 768px);
      margin: 0 auto;
      padding: 0 var(--space-sm);
      animation: float 6s ease-in-out infinite;
    }

    .logo-area {
      margin-bottom: var(--space-xl);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      width: 100%;
    }

    .logo-svg {
      /* 📱 Tamaño fluido: 100px en móvil, hasta 130px en tablet */
      width: clamp(100px, 20vw, 130px);
      height: clamp(100px, 20vw, 130px);
      filter: drop-shadow(0 4px 12px rgba(30, 64, 175, 0.25));
      transition: transform var(--transition);
      flex-shrink: 0;
    }

    .logo-svg:hover {
      transform: scale(1.05);
    }

    .logo-svg img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
    }

    .logo-text {
      margin-top: var(--space-sm);
      /* 📱 Tipografía fluida */
      font-size: var(--text-2xl);
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary-700), var(--primary-500), var(--primary-400));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      line-height: 1.2;
      text-align: center;
    }

    .logo-sub {
      /* 📱 Tipografía fluida */
      font-size: var(--text-sm);
      color: var(--gray-600);
      margin-top: 0.25rem;
      font-weight: 500;
      text-align: center;
    }

    .buttons-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      margin: var(--space-lg) 0;
      width: 100%;
      max-width: 500px;
    }

    @media (min-width: 500px) {
      .buttons-group {
        flex-direction: row;
      }
    }

    .btn {
      width: 100%;
      padding: var(--space-md) var(--space-lg);
      border: none;
      border-radius: var(--radius-xl);
      /* 📱 Tipografía fluida */
      font-size: var(--text-lg);
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 2vw, 14px);
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
      color: white;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn-credito {
      background: linear-gradient(135deg, var(--primary-700), var(--primary-600));
    }

    .btn-credito:hover {
      background: linear-gradient(135deg, var(--primary-800), var(--primary-700));
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-ahorros {
      background: linear-gradient(135deg, var(--success-700), var(--success-600));
    }

    .btn-ahorros:hover {
      background: linear-gradient(135deg, var(--success-800, #166534), var(--success-700));
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn:active {
      transform: scale(0.98) translateY(0);
      transition: transform 0.1s;
    }

    .btn span:first-child {
      font-size: clamp(1.2rem, 2.5vw, 1.3rem);
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
      flex-shrink: 0;
    }

    .footer-note {
      margin-top: var(--space-lg);
      /* 📱 Tipografía fluida */
      font-size: var(--text-xs);
      color: var(--gray-500);
      text-align: center;
      padding-top: var(--space-sm);
      border-top: 1px solid var(--gray-200);
      font-weight: 500;
      width: 100%;
    }

    /* ========== HEADER COMÚN ========== */
    .header-modern {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-sm) var(--space-md);
      background: white;
      border-bottom: 1px solid var(--gray-200);
      flex-wrap: wrap;
      gap: var(--space-xs);
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(8px);
      width: 100%;
    }

    .back-btn {
      background: linear-gradient(135deg, var(--primary-600), var(--primary-500));
      color: white;
      border: none;
      padding: clamp(0.5rem, 1.5vw, 0.65rem) clamp(0.8rem, 2vw, 1.4rem);
      border-radius: var(--radius-full);
      font-weight: 600;
      cursor: pointer;
      /* 📱 Tipografía fluida */
      font-size: var(--text-sm);
      transition: all var(--transition);
      box-shadow: var(--shadow);
      display: inline-flex;
      align-items: center;
      gap: clamp(4px, 1vw, 6px);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .back-btn:hover {
      background: linear-gradient(135deg, var(--primary-700), var(--primary-600));
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .back-btn:active {
      transform: scale(0.98);
    }

    .logo-small {
      width: clamp(40px, 8vw, 44px);
      height: auto;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }

    .module h1 {
      /* 📱 Tipografía fluida */
      font-size: var(--text-xl);
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary-700), var(--primary-600));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin: 0;
      text-align: center;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ========== FORMULARIOS ========== */
    .card-form-modern {
      background: linear-gradient(145deg, var(--primary-800), var(--primary-900));
      margin: var(--space-sm);
      padding: var(--space-md);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(255,255,255,0.1);
      width: 100%;
    }

    .card-form-ahorros {
      background: linear-gradient(145deg, var(--success-700), #065f46);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }

    .input-group {
      flex: 1 1 100%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }

    @media (min-width: 480px) {
      .input-group {
        flex: 1 1 calc(50% - 0.5rem);
        min-width: 140px;
      }
    }

    .card-form-modern label {
      display: block;
      /* 📱 Tipografía fluida */
      font-size: var(--text-xs);
      text-transform: uppercase;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.5px;
      opacity: 0.95;
    }

    .field-modern, .select-modern {
      width: 100%;
      padding: clamp(0.7rem, 1.5vw, 0.85rem) clamp(0.8rem, 2vw, 1rem);
      border-radius: var(--radius-lg);
      border: 2px solid transparent;
      background: white;
      /* 📱 Tipografía fluida */
      font-size: var(--text-base);
      font-weight: 500;
      color: var(--gray-800);
      outline: none;
      transition: all var(--transition);
      box-shadow: var(--shadow-sm);
    }

    .field-modern::placeholder {
      color: var(--gray-400);
    }

    .field-modern:focus, .select-modern:focus {
      border-color: var(--warning-500);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.25);
      transform: translateY(-1px);
    }

    .select-modern {
      appearance: none;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 0.75rem center;
      background-repeat: no-repeat;
      background-size: 1.25em 1.25em;
      padding-right: 2.5rem;
    }

    .btn-generar {
      background: linear-gradient(135deg, var(--success-600), var(--success-500));
      color: white;
      border: none;
      padding: var(--space-md);
      border-radius: var(--radius-full);
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: var(--space-md);
      /* 📱 Tipografía fluida */
      font-size: var(--text-base);
      transition: all var(--transition);
      box-shadow: var(--shadow-md);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: clamp(6px, 1.5vw, 8px);
    }

    .btn-generar:hover {
      background: linear-gradient(135deg, var(--success-700), var(--success-600));
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-generar:active {
      transform: scale(0.98) translateY(0);
    }

    /* ========== TABLAS ========== */
    .table-container {
      padding: 0 var(--space-md) var(--space-lg);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
      /* Scrollbar sutil para indicar que hay más contenido */
      scrollbar-width: thin;
      scrollbar-color: var(--primary-400) transparent;
    }

    .table-container::-webkit-scrollbar {
      height: 6px;
    }

    .table-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .table-container::-webkit-scrollbar-thumb {
      background: var(--primary-400);
      border-radius: 3px;
    }

    .financing-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      /* 📱 Tipografía fluida para tablas */
      font-size: var(--text-sm);
      min-width: 500px; /* Para forzar scroll horizontal en móviles */
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      background: white;
    }

    .financing-table thead {
      background: linear-gradient(135deg, var(--primary-800), var(--primary-700));
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .financing-table th {
      color: white;
      padding: clamp(0.6rem, 1.5vw, 0.85rem) clamp(0.5rem, 1vw, 0.75rem);
      text-align: center;
      font-weight: 700;
      /* 📱 Tipografía fluida */
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .financing-table td {
      padding: clamp(0.6rem, 1.5vw, 0.85rem) clamp(0.5rem, 1vw, 0.75rem);
      border-bottom: 1px solid var(--gray-100);
      text-align: center;
      font-weight: 500;
      white-space: nowrap;
    }

    .financing-table tbody tr {
      transition: background var(--transition);
    }

    .financing-table tbody tr:hover {
      background: var(--primary-50);
    }

    .financing-table tbody tr:last-child td {
      border-bottom: none;
    }

    .col-plazo { color: var(--primary-700); font-weight: 700; }
    .col-cuota { color: var(--success-600); font-weight: 700; }
    .col-interes { color: var(--warning-600); font-weight: 600; }
    .col-total { color: var(--primary-800); font-weight: 800; }

    /* Tabla calendario */
    .tabla-calendario {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-top: var(--space-sm);
      /* 📱 Tipografía fluida */
      font-size: var(--text-xs);
      min-width: 450px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      background: white;
    }

    .tabla-calendario thead {
      background: linear-gradient(135deg, var(--primary-800), var(--primary-700));
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .tabla-calendario th {
      color: white;
      padding: clamp(0.5rem, 1.2vw, 0.75rem) clamp(0.3rem, 0.8vw, 0.5rem);
      font-weight: 600;
      /* 📱 Tipografía fluida */
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .tabla-calendario td {
      padding: clamp(0.5rem, 1.2vw, 0.7rem) clamp(0.3rem, 0.8vw, 0.5rem);
      border-bottom: 1px solid var(--gray-100);
      text-align: center;
      white-space: nowrap;
    }

    .tabla-calendario tbody tr:hover {
      background: var(--primary-50);
    }

    .tabla-calendario tfoot {
      background: linear-gradient(135deg, var(--gray-100), var(--gray-50));
      font-weight: 700;
    }

    .info-box {
      background: linear-gradient(135deg, var(--primary-50), white);
      border-left: 4px solid var(--primary-500);
      padding: var(--space-sm) var(--space-md);
      border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
      margin-top: var(--space-md);
      /* 📱 Tipografía fluida */
      font-size: var(--text-sm);
      box-shadow: var(--shadow-sm);
      line-height: 1.6;
    }

    .info-box strong {
      color: var(--primary-800);
    }

    .dias-calculo {
      background: linear-gradient(135deg, var(--primary-100), white);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-lg);
      margin-top: var(--space-sm);
      /* 📱 Tipografía fluida */
      font-size: var(--text-sm);
      color: var(--primary-800);
      font-weight: 600;
      text-align: center;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--primary-200);
    }

    .btn-imprimir {
      background: linear-gradient(135deg, var(--primary-600), var(--primary-500));
      color: white;
      border: none;
      padding: var(--space-md);
      border-radius: var(--radius-full);
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: var(--space-md);
      /* 📱 Tipografía fluida */
      font-size: var(--text-base);
      transition: all var(--transition);
      box-shadow: var(--shadow-md);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: clamp(6px, 1.5vw, 8px);
    }

    .btn-imprimir:hover {
      background: linear-gradient(135deg, var(--primary-700), var(--primary-600));
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .footer-text {
      text-align: center;
      /* 📱 Tipografía fluida */
      font-size: var(--text-xs);
      color: var(--gray-500);
      padding: var(--space-sm);
      border-top: 1px solid var(--gray-200);
      background: white;
      font-weight: 500;
    }

    /* Módulos */
    .module {
      display: none;
      width: 100%;
      min-height: 100vh;
      background: white;
      animation: fadeIn 0.3s ease-out;
    }

    .module.active-module {
      display: block;
    }

    /* Scrollbar personalizado para WebKit */
    ::-webkit-scrollbar {
      width: clamp(6px, 1.5vw, 8px);
      height: clamp(6px, 1.5vw, 8px);
    }

    ::-webkit-scrollbar-track {
      background: var(--gray-100);
      border-radius: var(--radius-full);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--primary-400);
      border-radius: var(--radius-full);
      transition: background var(--transition);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary-500);
    }

    /* Focus visible para accesibilidad */
    .btn:focus-visible,
    .field-modern:focus-visible,
    .select-modern:focus-visible,
    .back-btn:focus-visible {
      outline: 2px solid var(--primary-400);
      outline-offset: 2px;
    }

    /* 🖥️ MEDIA QUERIES - Computadora se comporta como tablet */
    
    /* Tablet y desktop pequeño: mantener layout de tablet */
    @media (min-width: 768px) {
      .content-wrapper {
        max-width: 768px; /* 🖥️ Forzar ancho de tablet en desktop */
        padding: 0 var(--space-md);
      }
      
      .logo-svg {
        width: 130px;
        height: 130px;
      }
      
      .logo-text {
        font-size: 1.875rem;
      }
      
      .btn {
        padding: 1.3rem 2rem;
        font-size: 1.25rem;
      }
      
      .card-form-modern {
        margin: 1.5rem;
        padding: 1.75rem;
      }
      
      .table-container {
        padding: 0 1.5rem 2rem;
      }
      
      .financing-table {
        font-size: 0.9rem;
      }
      
      .module h1 {
        font-size: 1.5rem;
      }
      
      .header-modern {
        padding: 1.25rem 1.5rem;
      }
    }

    /* Desktop grande: centrar como tablet, NO expandir */
    @media (min-width: 1024px) {
      body {
        /* Centrar contenido en pantallas grandes */
        justify-content: center;
        padding: var(--space-lg);
      }
      
      .app-container {
        /* 🖥️ Mantener comportamiento de tablet: NO expandir a full desktop */
        max-width: 768px;
        width: 100%;
      }
      
      .content-wrapper {
        max-width: 100%;
      }
      
      .card-form-modern {
        margin: 2rem auto;
        max-width: 100%;
      }
      
      .table-container {
        max-width: 100%;
        margin: 0 auto;
      }
    }

    /* 🖨️ Estilos de impresión */
    @media print {
      body {
        background: white !important;
        animation: none !important;
        padding: 0 !important;
        font-size: 10pt !important;
      }
      
      .app-container {
        max-width: 100% !important;
      }
      
      .card-form-modern, .btn-generar, .btn-imprimir, .footer-text, 
      .header-modern .back-btn, .dias-calculo, .menu-container, .footer-note {
        display: none !important;
      }
      
      .module.active-module { 
        display: block !important; 
        min-height: auto;
        background: white;
      }
      
      .financing-table, .tabla-calendario {
        box-shadow: none !important;
        border: 1px solid #000 !important;
        font-size: 9pt !important;
      }
      
      .financing-table th, .tabla-calendario th {
        background: #1e40af !important;
        color: white !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }

    /* 📱 Ajustes para pantallas muy pequeñas */
    @media (max-width: 360px) {
      :root {
        --text-base: 0.85rem;
        --text-sm: 0.75rem;
        --text-xs: 0.65rem;
      }
      
      .logo-text {
        font-size: 1.4rem;
      }
      
      .logo-sub {
        font-size: 0.8rem;
      }
      
      .btn {
        font-size: 1rem;
        padding: 1rem 1.25rem;
      }
      
      .header-modern {
        padding: 0.75rem 1rem;
      }
      
      .back-btn {
        font-size: 0.8rem;
        padding: 0.5rem 1rem;
      }
    }

    /* 🌙 Modo oscuro opcional (respetar preferencia del sistema) */
    @media (prefers-color-scheme: dark) {
      /* Se puede activar si se desea modo oscuro automático */
    }

    /* Utilidad para elementos que necesitan scroll */
    .scrollable {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Evitar zoom accidental en inputs en iOS */
    @media screen and (-webkit-min-device-pixel-ratio: 0) {
      input, select, textarea {
        font-size: 16px !important;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- MENÚ PRINCIPAL -->
  <div id="menuPrincipal" class="menu-container">
    <div class="content-wrapper">
      <div class="logo-area">
        <div class="logo-svg">
          <img src="logo.png" alt="San Gaspar" style="width: 100%; height: 100%; object-fit: contain;">
        </div>
        <div class="logo-text">SAN GASPAR R.L.</div>
        <div class="logo-sub">COOPERATIVA DE AHORRO Y CRÉDITO</div>
      </div>

      <div class="buttons-group">
        <button id="btnCredito" class="btn btn-credito">
          <span>💳</span>
          <span>Crédito</span>
        </button>
        <button id="btnAhorros" class="btn btn-ahorros">
          <span>🏦</span>
          <span>Ahorros</span>
        </button>
      </div>

      <div class="footer-note">
        📱 Cotizador | Crédito · Ahorros
      </div>
    </div>
  </div>

  <!-- MÓDULO CRÉDITOS -->
  <div id="module-creditos" class="module">
    <div class="header-modern">
      <button class="back-btn" onclick="mostrarMenu()">
        <span>←</span> Volver
      </button>
      <h1>COTIZADOR DE CRÉDITOS</h1>
      <img src="logo.png" class="logo-small" onerror="this.style.display='none';" alt="logo">
    </div>
    <div class="card-form-modern">
      <div class="form-row">
        <div class="input-group">
          <label>💰 MONTO A FINANCIAR</label>
          <input type="text" id="monto" class="field-modern" placeholder="Ej: 1,000" inputmode="decimal" value="">
        </div>
        <div class="input-group">
          <label>📊 TASA DE INTERÉS (MENSUAL)</label>
          <select id="tasa" class="select-modern">
            <option value="24">2.00% PRINCIPAL</option>
            <option value="20">1.67% DEPOSITARIA</option>
            <option value="20">1.67% MASVI</option>
            <option value="27.60">2.30% INMEDIATO</option>
          </select>
        </div>
      </div>
    </div>
    <div class="table-container">
      <table class="financing-table" id="tablaResultados">
        <thead><tr><th>PLAZO</th><th>CUOTA MENSUAL</th><th>TOTAL INTERÉS</th><th>TOTAL A PAGAR</th></tr></thead>
        <tbody id="tablaBody"><tr><td colspan="4" style="text-align:center; padding: 1.5rem;">💰 Ingrese un monto</td></tr></tbody>
      </table>
    </div>
    <div class="footer-text">COTIZADOR SG v2.1 · ECM</div>
  </div>

  <!-- MÓDULO AHORROS -->
  <div id="module-ahorros" class="module">
    <div class="header-modern">
      <button class="back-btn" onclick="mostrarMenu()">
        <span>←</span> Volver
      </button>
      <h1>COTIZADOR DE AHORROS</h1>
      <img src="logo.png" class="logo-small" onerror="this.style.display='none';" alt="logo">
    </div>
    <div class="card-form-modern card-form-ahorros">
      <div class="form-row">
        <div class="input-group">
          <label>🏦 TIPO DE AHORRO</label>
          <select id="productoAhorro" class="select-modern">
            <option value="">Seleccione un producto...</option>
            <option value="corriente">Ahorro Corriente (6% anual)</option>
            <option value="infanto">Ahorro Infanto Juvenil (5% anual)</option>
            <option value="plazofijo">Ahorro a Plazo Fijo</option>
            <option value="plazofijo_pref">Ahorro a Plazo Fijo Preferencial</option>
            <option value="inversion_f1">Inversiones entre Cooperativas F.I</option>
            <option value="inversion_f2">Inversiones entre Cooperativas F.II</option>
          </select>
        </div>
        <div class="input-group">
          <label>💰 MONTO A INVERTIR</label>
          <input type="text" id="montoAhorro" class="field-modern" placeholder="Ej: 10,000" inputmode="decimal" value="">
        </div>
        <div class="input-group" id="plazoGroup" style="display:none;">
          <label>⏱️ PLAZO (MESES)</label>
          <select id="plazoAhorro" class="select-modern">
            <option value="6">6 MESES</option>
            <option value="12">12 MESES</option>
            <option value="24">24 MESES</option>
          </select>
        </div>
        <div class="input-group" id="frecuenciaGroup" style="display:none;">
          <label>📅 MODALIDAD</label>
          <select id="frecuenciaAhorro" class="select-modern">
            <option value="mensual">Mensual</option>
            <option value="trimestral">Trimestral</option>
            <option value="semestral">Semestral</option>
            <option value="anual">Anual</option>
          </select>
        </div>
      </div>
      <div class="form-row" id="fechasGroup" style="display:none;">
        <div class="input-group">
          <label>📅 FECHA INICIO</label>
          <input type="date" id="fechaInicioAhorro" class="field-modern">
        </div>
        <div class="input-group">
          <label>📅 FECHA FINAL</label>
          <input type="date" id="fechaFinAhorro" class="field-modern" value="">
        </div>
      </div>
      <button id="btnGenerarAhorro" class="btn-generar">
        <span>🧮</span> Generar Cálculos
      </button>
    </div>

    <div class="table-container" id="resultadosAhorro" style="display:none;">
      <div id="diasCalculoContainer" class="dias-calculo" style="display:none;"></div>
      <div id="tablaCalendarioContainer"></div>
      <div id="infoBoxAhorro" class="info-box"></div>
      <button id="btnImprimirAhorro" class="btn-imprimir" style="display:none;">
        <span>🖨️</span> Imprimir Cotización
      </button>
    </div>
    <div class="footer-text">COTIZADOR SG · Rendimientos estimados · ISR 10% aplicado</div>
  </div>
</div>

<script>
  // ==================== VARIABLES GLOBALES ====================
  const menuPrincipal = document.getElementById('menuPrincipal');
  const moduleCredito = document.getElementById('module-creditos');
  const moduleAhorro = document.getElementById('module-ahorros');

  // ==================== NAVEGACIÓN CON HISTORIAL ====================
  
  function navegarA(vista) {
    menuPrincipal.style.display = 'none';
    moduleCredito.classList.remove('active-module');
    moduleAhorro.classList.remove('active-module');
    
    if (vista === 'credito') {
      moduleCredito.classList.add('active-module');
      renderizarTablaCreditos();
    } else if (vista === 'ahorro') {
      moduleAhorro.classList.add('active-module');
      document.getElementById('resultadosAhorro').style.display = 'none';
    } else {
      menuPrincipal.style.display = 'flex';
    }
    
    history.pushState({ vista: vista || 'menu' }, '', '#' + (vista || 'menu'));
  }

  window.addEventListener('popstate', function(event) {
    const estado = event.state;
    if (estado && estado.vista === 'credito') {
      moduleCredito.classList.add('active-module');
      moduleAhorro.classList.remove('active-module');
      menuPrincipal.style.display = 'none';
      renderizarTablaCreditos();
    } else if (estado && estado.vista === 'ahorro') {
      moduleAhorro.classList.add('active-module');
      moduleCredito.classList.remove('active-module');
      menuPrincipal.style.display = 'none';
      document.getElementById('resultadosAhorro').style.display = 'none';
    } else {
      mostrarMenu();
    }
  });

  window.mostrarMenu = function() {
    menuPrincipal.style.display = 'flex';
    moduleCredito.classList.remove('active-module');
    moduleAhorro.classList.remove('active-module');
    history.replaceState({ vista: 'menu' }, '', '#menu');
  }

  function mostrarCredito() { navegarA('credito'); }
  function mostrarAhorro() { navegarA('ahorro'); }

  document.getElementById('btnCredito').addEventListener('click', function(e) {
    e.preventDefault();
    mostrarCredito();
  });
  
  document.getElementById('btnAhorros').addEventListener('click', function(e) {
    e.preventDefault();
    mostrarAhorro();
  });

  // ==================== CRÉDITOS ====================
  const plazosMeses = [12, 18, 24, 36, 48, 60, 72, 84, 96, 108, 120];

  function formatMoney(valor) {
    if (isNaN(valor) || valor === null) return "Q 0.00";
    return "Q " + valor.toLocaleString("en-US", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function cleanNumber(value) {
    if (!value || value === "") return 0;
    let limpio = String(value).replace(/Q/gi, '').replace(/,/g, '').trim();
    let numero = parseFloat(limpio);
    return isNaN(numero) ? 0 : numero;
  }

  function calcularCuotaMensual(monto, tasaAnualPorcentaje, meses) {
    if (monto <= 0 || meses <= 0) return 0;
    const tasaMensual = (tasaAnualPorcentaje / 100) / 12;
    if (tasaMensual === 0) return monto / meses;
    const factor = Math.pow(1 + tasaMensual, meses);
    return monto * (tasaMensual * factor) / (factor - 1);
  }

  function renderizarTablaCreditos() {
    const montoRaw = cleanNumber(document.getElementById("monto").value);
    const tbody = document.getElementById("tablaBody");
    
    if (montoRaw === 0) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 1.5rem;">💰 Ingrese un monto</td></tr>`;
      return;
    }

    const tasa = parseFloat(document.getElementById("tasa").value);
    let html = "";
    for (let meses of plazosMeses) {
      const cuota = calcularCuotaMensual(montoRaw, tasa, meses);
      if (isNaN(cuota)) continue;
      const totalPagar = cuota * meses;
      const interesTotal = totalPagar - montoRaw;
      html += `<tr>
        <td class="col-plazo">${meses} MESES</td>
        <td class="col-cuota">${formatMoney(cuota)}</td>
        <td class="col-interes">${formatMoney(interesTotal)}</td>
        <td class="col-total">${formatMoney(totalPagar)}</td>
      </tr>`;
    }
    tbody.innerHTML = html;
  }

  const montoCreditInput = document.getElementById("monto");
  montoCreditInput.addEventListener("input", () => renderizarTablaCreditos());
  montoCreditInput.addEventListener("blur", function() {
    let val = cleanNumber(this.value);
    if (val > 0) this.value = formatMoney(val);
    renderizarTablaCreditos();
  });
  document.getElementById("tasa").addEventListener("change", () => renderizarTablaCreditos());

  // ==================== AHORROS ====================
  const productosAhorro = {
    corriente: { tasa: 6, min: 100, requiereFechas: true, nombre: "Ahorro Corriente", muestraDias: true },
    infanto: { tasa: 5, min: 100, requiereFechas: true, nombre: "Infanto Juvenil", muestraDias: true },
    plazofijo: {
      min: 1000, requiereFechas: false, nombre: "Plazo Fijo", muestraImprimir: false,
      rangos: [
        { desde: 1000, hasta: 99999.99, tasas: { 6: 12, 12: 14, 24: 'NA' } },
        { desde: 100000, hasta: 1999999.99, tasas: { 6: 14, 12: 14, 24: 15 } },
        { desde: 2000000, hasta: Infinity, tasas: { 6: 14, 12: 15, 24: 16 } }
      ]
    },
    plazofijo_pref: {
      min: 50000, requiereFechas: false, nombre: "Plazo Fijo Preferencial", requiereTabla: true, muestraImprimir: true,
      rangos: [
        { desde: 50000, hasta: 99999.99, tasas: { 6: 11, 12: 13, 24: 'NA' } },
        { desde: 100000, hasta: 1999999.99, tasas: { 6: 12, 12: 13, 24: 14 } },
        { desde: 2000000, hasta: Infinity, tasas: { 6: 13, 12: 14, 24: 15 } }
      ],
      frecuencias: ['mensual', 'trimestral', 'semestral', 'anual']
    },
    inversion_f1: { min: 1000000, tasa: 10.5, requiereFechas: false, nombre: "Inversiones F.I", muestraImprimir: false },
    inversion_f2: { 
      min: 1000000, tasa: 10, requiereFechas: false, nombre: "Inversiones F.II", requiereTabla: true, muestraImprimir: true,
      frecuencias: ['mensual', 'trimestral', 'semestral']
    }
  };

  let ultimoResultado = null, ultimoProducto = null;

  function diferenciaDias(f1, f2) {
    return Math.ceil(Math.abs(f2 - f1) / (1000 * 60 * 60 * 24));
  }

  function agregarMeses(fecha, meses) {
    const nueva = new Date(fecha);
    nueva.setMonth(nueva.getMonth() + meses);
    return nueva;
  }

  function formatearFecha(fecha) {
    return fecha.toLocaleDateString('es-GT', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function validarMontoPlazo(producto, monto, plazo) {
    const config = productosAhorro[producto];
    if (!config.rangos) return { valido: true, tasa: config.tasa };
    const rango = config.rangos.find(r => monto >= r.desde && monto <= r.hasta);
    if (!rango) return { valido: false, msg: `Monto no aplica` };
    const tasa = rango.tasas[plazo];
    if (!tasa || tasa === 'NA') return { valido: false, msg: `Plazo no disponible` };
    return { valido: true, tasa: tasa };
  }

  function generarTablaCalendario(r, producto) {
    const config = productosAhorro[producto];
    const frecuencias = { 'mensual': 1, 'trimestral': 3, 'semestral': 6, 'anual': 12 };
    const per = frecuencias[r.frecuencia] || 12;
    const totalPer = Math.floor(r.plazo / per);
    const brutoPer = r.bruto / totalPer;
    const isrPer = r.isr / totalPer;
    
    let html = `<h4 style="margin-top: 15px; color: var(--primary-700); text-align: center; font-weight: 700;">📅 Calendario de Pagos - ${config.nombre}</h4>
    <table class="tabla-calendario">
      <thead><tr><th>#</th><th>Fecha</th><th>Interés Bruto</th><th>ISR (10%)</th><th>Interés Neto</th></tr></thead>
      <tbody>`;
    
    let fecha = new Date();
    for (let i = 1; i <= totalPer; i++) {
      html += `<tr>
        <td>${i}</td>
        <td>${formatearFecha(fecha)}</td>
        <td>${formatMoney(brutoPer)}</td>
        <td style="color:var(--danger-600); font-weight: 600;">- ${formatMoney(isrPer)}</td>
        <td style="color:var(--success-600); font-weight: 700;">${formatMoney(brutoPer - isrPer)}</td>
      </tr>`;
      fecha = agregarMeses(fecha, per);
    }
    
    html += `<tfoot>
      <tr><td colspan="2"><strong>TOTALES</strong></td><td><strong>${formatMoney(r.bruto)}</strong></td><td><strong style="color:var(--danger-600);">- ${formatMoney(r.isr)}</strong></td><td><strong style="color:var(--success-600);">${formatMoney(r.neto)}</strong></td></tr>
    </tfoot></table>`;
    return html;
  }

  function calcularAhorro() {
    const producto = document.getElementById('productoAhorro').value;
    if (!producto) {
      alert('⚠️ Seleccione un producto de ahorro.');
      return;
    }

    const config = productosAhorro[producto];
    const monto = cleanNumber(document.getElementById('montoAhorro').value);
    
    if (monto < config.min || monto === 0) {
      alert(`⚠️ El monto mínimo es ${formatMoney(config.min)}`);
      return;
    }

    let resultado = { monto: monto };

    if (producto === 'corriente' || producto === 'infanto') {
      const fechaInicio = new Date(document.getElementById('fechaInicioAhorro').value);
      const fechaFin = new Date(document.getElementById('fechaFinAhorro').value);
      if (isNaN(fechaInicio) || isNaN(fechaFin)) {
        alert('⚠️ Verifique las fechas.');
        return;
      }
      if (fechaFin <= fechaInicio) {
        alert('⚠️ La fecha final debe ser mayor a la fecha inicial.');
        return;
      }
      const dias = diferenciaDias(fechaInicio, fechaFin);
      const bruto = monto * (config.tasa / 100) * (dias / 365);
      const isr = bruto * 0.10;
      resultado = { ...resultado, tasa: config.tasa, dias, bruto, isr, neto: bruto - isr, total: monto + (bruto - isr) };
      mostrarResultadoAhorro(resultado, producto);
    } 
    else {
      const plazo = parseInt(document.getElementById('plazoAhorro').value);
      if (!plazo) {
        alert('⚠️ Seleccione un plazo.');
        return;
      }
      const valid = validarMontoPlazo(producto, monto, plazo);
      if (!valid.valido) {
        alert('⚠️ ' + valid.msg);
        return;
      }
      
      const tasaEncontrada = valid.tasa;
      const bruto = monto * (tasaEncontrada / 100) * (plazo / 12);
      const isr = bruto * 0.10;
      const frecuencia = (config.frecuencias && document.getElementById('frecuenciaAhorro')) ? document.getElementById('frecuenciaAhorro').value : null;
      
      resultado = { ...resultado, plazo, tasa: tasaEncontrada, frecuencia, bruto, isr, neto: bruto - isr, total: monto + (bruto - isr) };
      mostrarResultadoAhorro(resultado, producto);
    }
    
    ultimoResultado = resultado;
    ultimoProducto = producto;
  }

  function mostrarResultadoAhorro(r, producto) {
    const container = document.getElementById('resultadosAhorro');
    const calendarioContainer = document.getElementById('tablaCalendarioContainer');
    const infoBox = document.getElementById('infoBoxAhorro');
    const btnImprimir = document.getElementById('btnImprimirAhorro');
    const diasContainer = document.getElementById('diasCalculoContainer');
    const config = productosAhorro[producto];
    
    if (config.muestraDias && r.dias) {
      const fechaInicio = document.getElementById('fechaInicioAhorro').value;
      const fechaFin = document.getElementById('fechaFinAhorro').value;
      diasContainer.style.display = 'block';
      diasContainer.innerHTML = `📆 Días de cálculo: <strong>${r.dias} días</strong> (${fechaInicio} hasta ${fechaFin})`;
    } else {
      diasContainer.style.display = 'none';
    }
    
    if (config.requiereTabla && r.frecuencia && r.plazo) {
      calendarioContainer.innerHTML = generarTablaCalendario(r, producto);
    } else {
      calendarioContainer.innerHTML = '';
    }
    
    btnImprimir.style.display = config.muestraImprimir === true ? 'block' : 'none';
    
    infoBox.innerHTML = `<strong>ℹ️ Detalles del cálculo:</strong><br>
      • Producto: <strong>${config.nombre}</strong><br>
      • Monto invertido: <strong>${formatMoney(r.monto)}</strong><br>
      • Tasa anual: <strong>${r.tasa}%</strong><br>
      • Interés bruto: ${formatMoney(r.bruto)}<br>
      • ISR (10%): <span style="color:var(--danger-600);">-${formatMoney(r.isr)}</span><br>
      • Interés neto: <span style="color:var(--success-600); font-weight:700;">${formatMoney(r.neto)}</span><br>
      • <strong style="color:var(--primary-800); font-size:1.05em;">Total al vencimiento: ${formatMoney(r.total)}</strong>`;
    
    container.style.display = 'block';
  }

  function imprimirAhorro() {
    if (!ultimoResultado) {
      alert('⚠️ Genere la cotización primero.');
      return;
    }
    window.print();
  }

  function actualizarCamposAhorro() {
    const producto = document.getElementById('productoAhorro').value;
    const plazoGroup = document.getElementById('plazoGroup');
    const frecuenciaGroup = document.getElementById('frecuenciaGroup');
    const fechasGroup = document.getElementById('fechasGroup');
    const resultadosContainer = document.getElementById('resultadosAhorro');
    const calendarioContainer = document.getElementById('tablaCalendarioContainer');
    
    plazoGroup.style.display = 'none';
    frecuenciaGroup.style.display = 'none';
    fechasGroup.style.display = 'none';
    resultadosContainer.style.display = 'none';
    calendarioContainer.innerHTML = '';
    
    if (!producto) return;
    
    const config = productosAhorro[producto];
    
    if (producto === 'corriente' || producto === 'infanto') {
      fechasGroup.style.display = 'flex';
      const hoy = new Date().toISOString().split('T')[0];
      document.getElementById('fechaInicioAhorro').value = hoy;
      document.getElementById('fechaFinAhorro').value = '';
    } else {
      plazoGroup.style.display = 'flex';
      if (config.frecuencias) {
        frecuenciaGroup.style.display = 'flex';
      }
    }
  }

  function setupMoneyInput(inputId) {
    const input = document.getElementById(inputId);
    if (!input) return;
    
    let numericValue = '';
    input.addEventListener('input', function(e) {
      let val = e.target.value.replace(/[^0-9.]/g, '');
      let partes = val.split('.');
      if (partes.length > 2) val = partes[0] + '.' + partes.slice(1).join('');
      if (partes.length === 2 && partes[1].length > 2) val = partes[0] + '.' + partes[1].substring(0, 2);
      numericValue = val;
      e.target.value = val;
    });
    
    input.addEventListener('blur', function(e) {
      if (numericValue && !isNaN(parseFloat(numericValue))) {
        let numero = parseFloat(numericValue);
        e.target.value = formatMoney(numero);
      } else {
        e.target.value = '';
        numericValue = '';
      }
    });
    
    input.addEventListener('focus', function(e) {
      e.target.value = numericValue;
    });
  }

  document.getElementById('productoAhorro').addEventListener('change', actualizarCamposAhorro);
  document.getElementById('btnGenerarAhorro').addEventListener('click', calcularAhorro);
  document.getElementById('btnImprimirAhorro').addEventListener('click', imprimirAhorro);
  
  setupMoneyInput('montoAhorro');

  window.addEventListener('DOMContentLoaded', () => {
    history.replaceState({ vista: 'menu' }, '', '#menu');
    document.getElementById('monto').value = '';
    document.getElementById('montoAhorro').value = '';
    renderizarTablaCreditos();
    actualizarCamposAhorro();
    mostrarMenu();
  });

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
      for(let registration of registrations) registration.unregister();
      navigator.serviceWorker.register("service-worker.js").catch(e => console.log("SW error"));
    });
  }
</script>
</body>
</html>
